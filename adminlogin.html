<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Balance+</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0B6B7A;
            --primary-dark: #07505A;
            --accent: #6FCF97;
            --sky: #7DD3FC;
            --bg: #F6FBFC;
            --card: #FFFFFF;
            --text: #0F172A;
            --text-muted: #64748B;
            --border: rgba(15, 23, 42, 0.10);
            --error: #EF4444;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #F6FBFC 0%, #E0F2F4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(11, 107, 122, 0.05) 0%, transparent 70%);
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -15%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(111, 207, 151, 0.04) 0%, transparent 70%);
            border-radius: 50%;
        }

        .admin-container {
            max-width: 1100px;
            width: 100%;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(11, 107, 122, 0.15);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative;
            z-index: 1;
        }

        .admin-left {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .admin-left::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .admin-left::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
        }

        .visual-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 42px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .logo-tagline {
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            font-weight: 500;
        }

        .illustration {
            margin: 40px 0;
        }

        .dashboard-icons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 280px;
            margin: 0 auto;
        }

        .icon-box {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px 20px;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .icon-box:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-4px);
        }

        .icon-box svg {
            width: 36px;
            height: 36px;
            color: white;
            margin-bottom: 8px;
        }

        .icon-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .admin-right {
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .admin-header {
            margin-bottom: 40px;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(11, 107, 122, 0.1) 0%, rgba(111, 207, 151, 0.08) 100%);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(11, 107, 122, 0.15);
        }

        .admin-badge svg {
            width: 16px;
            height: 16px;
        }

        .admin-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .admin-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 400px;
        }

        .login-form {
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: var(--card);
            color: var(--text);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 107, 122, 0.08);
        }

        .form-input::placeholder {
            color: #94A3B8;
        }

        .forgot-password {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 24px;
        }

        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .forgot-password a:hover {
            opacity: 0.7;
        }

        .login-btn {
            width: 100%;
            padding: 16px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(11, 107, 122, 0.2);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(11, 107, 122, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .security-note {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 24px;
        }

        .security-note svg {
            width: 18px;
            height: 18px;
            color: var(--error);
            flex-shrink: 0;
        }

        .security-note p {
            font-size: 13px;
            color: #991B1B;
            margin: 0;
            font-weight: 500;
        }

        .back-home {
            text-align: center;
            margin-top: 28px;
        }

        .back-home a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .back-home a:hover {
            color: var(--primary);
        }

        .back-home svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 968px) {
            .admin-container {
                grid-template-columns: 1fr;
                max-width: 500px;
            }

            .admin-left {
                padding: 40px 30px;
            }

            .dashboard-icons {
                grid-template-columns: repeat(4, 1fr);
                max-width: 100%;
            }

            .icon-box {
                padding: 20px 16px;
            }

            .icon-box svg {
                width: 32px;
                height: 32px;
            }

            .icon-label {
                font-size: 12px;
            }

            .admin-right {
                padding: 40px 30px;
            }

            .admin-title {
                font-size: 30px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .admin-left {
                padding: 32px 24px;
            }

            .logo {
                font-size: 36px;
            }

            .dashboard-icons {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .admin-right {
                padding: 32px 24px;
            }

            .admin-title {
                font-size: 26px;
            }

            .admin-subtitle {
                font-size: 14px;
            }

            .form-input {
                padding: 13px 16px 13px 46px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-left">
            <div class="visual-content">
                <div class="logo-section">
                    <div class="logo">Balance+</div>
                    <div class="logo-tagline">Admin Dashboard</div>
                </div>

                <div class="illustration">
                    <div class="dashboard-icons">
                        <div class="icon-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                            </svg>
                            <div class="icon-label">Recipes</div>
                        </div>
                        <div class="icon-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                            </svg>
                            <div class="icon-label">Workouts</div>
                        </div>
                        <div class="icon-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                <line x1="12" y1="17" x2="12.01" y2="17"></line>
                            </svg>
                            <div class="icon-label">Plans</div>
                        </div>
                        <div class="icon-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            <div class="icon-label">Users</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="admin-right">
            <div class="admin-header">
                <div class="admin-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Admin Access
                </div>
                <h1 class="admin-title">Admin Login</h1>
                <p class="admin-subtitle">Access the admin dashboard to manage recipes, workouts, health tips, and users.</p>
            </div>

            <form class="login-form" id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail" class="form-label">Admin Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input 
                            type="email" 
                            id="adminEmail" 
                            class="form-input" 
                            placeholder="admin@balanceplus.com"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminPassword" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input 
                            type="password" 
                            id="adminPassword" 
                            class="form-input" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="#forgot">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login as Admin</button>
            </form>

            <div class="security-note">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <p>Authorized administrators only. All access is monitored and logged.</p>
            </div>

            <div class="back-home">
                <a href="index.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            if (email && password) {
                alert('Login functionality would be connected to backend authentication.');
            }
        });
    </script>
</body>
</html>
